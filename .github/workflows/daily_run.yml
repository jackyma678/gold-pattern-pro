name: Daily Gold Analysis

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance google-genai httpx

      - name: Run analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python daily_gold_analysis.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "gold-pattern-pro-bot"
          git config --global user.email "gold-pattern-pro@users.noreply.github.com"
          git add README.md _posts/
          git commit -m "Add new gold article" || echo "No changes to commit"
          git push origin main
