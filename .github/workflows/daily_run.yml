name: Daily Gold Analysis

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 升级到 3.10 以支持最新 Google 库

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance google-generativeai # 确保安装最新版

      - name: Run analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python daily_gold_analysis.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "jackyma678-bot"
          git config --global user.email "jackyma678@users.noreply.github.com"
          git add README.md
          git commit -m "Update daily analysis [skip ci]" || echo "No changes to commit"
          git push origin main
