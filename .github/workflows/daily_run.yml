name: Daily Gold Analysis

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上8点运行
  workflow_dispatch: # 允许手动触发

# 显式声明需要写入权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # 升级到 v3 减少警告

      - name: Set up Python
        uses: actions/setup-python@v4 # 升级到 v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install yfinance google-generativeai

      - name: Run analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python daily_gold_analysis.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "jackyma678-bot"
          git config --global user.email "jackyma678@users.noreply.github.com"
          git add README.md
          git commit -m "Update daily gold analysis [skip ci]" || echo "No changes to commit"
          git push origin main
