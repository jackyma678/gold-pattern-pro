name: Daily Gold Analysis

on:
  schedule:
    # 每小时（UTC 整点）在周一到周五运行一次
    - cron: '0 * * * 1-5'
  workflow_dispatch:

# generate 需写仓库；Pages 构建/部署需 pages 与 id-token
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    name: Generate post and push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance google-genai httpx

      - name: Run analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python daily_gold_analysis.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "gold-pattern-pro-bot"
          git config --global user.email "gold-pattern-pro@users.noreply.github.com"
          git add README.md _posts/ social/ automation/
          git commit -m "Add new gold article" || echo "No changes to commit"
          git push origin main

  # 机器人 push 使用 GITHUB_TOKEN 不会触发单独的 on:push 的 Pages workflow，
  # 因此在同一 workflow 内在 push 之后再构建并部署，保证 _posts 与线上始终一致。
  pages-build:
    name: Build GitHub Pages
    runs-on: ubuntu-latest
    needs: generate
    if: success()
    concurrency:
      group: pages
      cancel-in-progress: true
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout (tip of main after push)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: .
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  pages-deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: pages-build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
