<!doctype html>
<html lang="{{ site.lang | default: "zh-CN" }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}
    </title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}" />
    <link rel="canonical" href="{{ page.url | absolute_url }}" />

    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ "/feed.xml" | relative_url }}" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <a class="brand" href="{{ "/" | relative_url }}">{{ site.title }}</a>
        <nav class="nav">
          <a href="{{ "/" | relative_url }}">首页</a>
          <a href="{{ "/feed.xml" | relative_url }}">RSS</a>
          <a href="https://github.com/gold-pattern-pro/gold-article">GitHub</a>
        </nav>
      </div>
    </header>

    <main class="container">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container">
        <div>© {{ site.time | date: "%Y" }} · {{ site.title }}</div>
      </div>
    </footer>
  </body>
</html>
