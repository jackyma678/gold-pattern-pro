title: "黄金形态通APP - 黄金行情博客"
description: "每 15 分钟更新：黄金（XAU/USD）K线形态与技术面解读。"
lang: zh-CN
timezone: UTC
# 文章 date 为生成时刻 UTC，避免在整点构建时被判为「未来文章」而从 site.posts 剔除
future: true

url: "https://gold-pattern-pro.github.io"
baseurl: "/gold-article"

permalink: /posts/:year/:month/:day/:title/

markdown: kramdown
theme: minima

plugins:
  - jekyll-feed
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

